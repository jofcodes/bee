# ── Level 1: Blob analysis thresholds ──────────────────────────────────

blob:
  # Minimum contour area (pixels²) to consider a blob.
  # Filters sensor noise. Blink 1080p: a bee ≈ 300–1200 px².
  min_area: 100

  # Morphology kernel size for cleaning the foreground mask.
  morph_kernel: 5

background:
  # MOG2 history length (frames). Shorter = adapts faster to static scene.
  history: 200
  # MOG2 variance threshold.
  var_threshold: 40
  # Frames to skip at clip start while MOG2 warms up.
  warmup_frames: 10

tracker:
  # Max pixel distance between centroids to match across frames.
  max_distance: 60
  # Frames a track can be missing before it's finalized.
  max_gap: 3

# ── Outlier detection ──────────────────────────────────────────────────

outlier:
  # z-score threshold (relative to time-bucket median/IQR).
  # Higher = fewer flags. 2.5 was too noisy; 5.0 flags only extreme outliers.
  z_threshold: 5.0

  # Anomaly must persist across at least this many frames to be flagged.
  min_persistence_frames: 5

  # Group clips into N-hour buckets for per-time-of-day modeling.
  time_bucket_hours: 2

  # Need at least N clips in a bucket to compute reliable statistics.
  # Below this, only absolute thresholds are used.
  min_clips_for_stats: 5

  # ── Absolute thresholds (used when not enough data for statistics) ──
  # Blob area above this is always suspicious (likely larger than a bee).
  # Blink 1080p: a close-up bee can be 30,000–40,000 px².
  # A rat/bird/large wasp would be 80,000+ px².
  abs_max_blob_area: 80000
  # Blob dwelling (frames in roughly the same spot) above this is suspicious.
  abs_max_dwell_frames: 90     # ~3s at 30 fps
  # Blob area ratio: flag if largest blob > N× the clip's median blob.
  # Bees vary 10–100× due to distance from camera. Use a high ratio.
  large_blob_ratio: 200.0

# ── Vision model (primary detector) ────────────────────────────────────

vision:
  # Set to false to skip vision analysis entirely (blob analysis only).
  enabled: true

  # Ollama model name. Install: brew install ollama && ollama pull llava
  model: "llava"

  # Max clips to analyze per run (0 = no limit).
  max_clips: 0

# ── Report ─────────────────────────────────────────────────────────────

report:
  # Max thumbnail width for the HTML report.
  thumbnail_width: 400
  # Maximum flagged events to include in the report.
  max_events: 200
